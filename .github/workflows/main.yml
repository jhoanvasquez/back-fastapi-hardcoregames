name: Health Check

on:
  schedule:
    # 6am–11pm Colombia (UTC-5) = 11am–4am UTC (split into two ranges)
    - cron: "*/5 11-23 * * *"
    - cron: "*/5 0-4 * * *"
jobs:
  ping:
    name: Ping /health
    runs-on: ubuntu-latest

    steps:
      - name: Call health endpoint
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "${{ secrets.BACKEND_URL }}/health")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"
