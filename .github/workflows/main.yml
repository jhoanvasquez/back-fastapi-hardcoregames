name: Health Check

on:
  schedule:
    # Every 3 minutes from 6:00 AM to 11:59 PM UTC (covers 6am–midnight)
    - cron: "*/3 6-23 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    name: Ping /health
    runs-on: ubuntu-latest

    steps:
      - name: Call health endpoint
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "${{ secrets.BACKEND_URL }}/health")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"
